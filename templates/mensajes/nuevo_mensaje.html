{% extends 'base.html' %}

{% block titulo %}Nuevo mensaje{% endblock %}

{% block contenido %}
<h1 class="seccion-titulo">Nuevo mensaje</h1>
<p class="seccion-descripcion">Elige un destinatario y escribe tu mensaje.</p>

<form method="POST" class="formulario">
    {% csrf_token %}
    {% for field in form %}
    <div class="campo">
        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<span class="campo-error">{{ field.errors.0 }}</span>{% endif %}
    </div>
    {% endfor %}
    <div style="margin-top: 1.5rem;">
        <input type="submit" value="Enviar mensaje" class="boton">
        <a href="{% url 'bandeja' %}" class="boton boton-outline" style="margin-left: 0.75rem;">Cancelar</a>
    </div>
</form>
{% endblock %}

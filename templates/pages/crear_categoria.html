{% extends 'base.html' %}

{% block titulo %}Registrar categoria{% endblock %}

{% block contenido %}
<h1 class="seccion-titulo">Registrar categoria</h1>
<p class="seccion-descripcion">Definir una nueva categoria para clasificar los articulos.</p>

{% if mensaje %}
<div class="mensaje-exito">{{ mensaje }}</div>
{% endif %}

<form method="POST" class="formulario">
    {% csrf_token %}
    {{ formulario.as_p }}
    <input type="submit" value="Guardar" class="boton">
</form>
{% endblock %}
